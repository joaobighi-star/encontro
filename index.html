<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontro de Gerações - PIB/RJ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
        }
        .container { 
            max-width: 500px; 
            width: 100%;
            background: white; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #1a3a5a;
            color: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 6px solid #f39c12;
        }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }
        .header p { margin: 10px 0 0; font-size: 15px; line-height: 1.4; }
        
        form { padding: 25px; }
        .texto-apoio { 
            font-size: 15px; 
            color: #333; 
            margin-bottom: 20px; 
            line-height: 1.5;
            background-color: #fff9f0;
            padding: 15px;
            border-left: 4px solid #f39c12;
            border-radius: 4px;
        }
        
        .participante-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .campo-nome { flex: 3; }
        .campo-idade { flex: 1; }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #f39c12; outline: none; }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: #25d366; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            margin-top: 20px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #128c7e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ENCONTRO DE GERAÇÕES</h1>
            <p>30/05/2026 - 10hs - PIB/RJ</p>
        </div>
        
        <form id="formEvento">
            <div class="texto-apoio">
                Confirme a sua participação e a de sua família ou seus convidados. 
                Informe a sua idade para adequarmos as atividades que serão realizadas.
            </div>
            
            <div id="listaParticipantes">
                <div class="participante-row">
                    <input type="text" class="campo-nome" placeholder="Nome Completo" required>
                    <input type="number" class="campo-idade" placeholder="Idade" required>
                </div>
            </div>

            <button type="submit">Enviar inscrição via WhatsApp</button>
        </form>
    </div>

    <script>
        const lista = document.getElementById('listaParticipantes');
        const telefoneOrganizador = "5521992176790";

        function configurarMonitoramento(linha) {
            const inputNome = linha.querySelector('.campo-nome');
            inputNome.addEventListener('input', function handleInput() {
                if (this.value.trim() !== "") {
                    const novaLinha = document.createElement('div');
                    novaLinha.className = 'participante-row';
                    novaLinha.innerHTML = `
                        <input type="text" class="campo-nome" placeholder="Nome do convidado">
                        <input type="number" class="campo-idade" placeholder="Idade">
                    `;
                    lista.appendChild(novaLinha);
                    
                    this.removeEventListener('input', handleInput);
                    configurarMonitoramento(novaLinha);
                }
            });
        }

        configurarMonitoramento(document.querySelector('.participante-row'));

        document.getElementById('formEvento').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let mensagem = "*INSCRIÇÃO: ENCONTRO DE GERAÇÕES*\n";
            mensagem += "📍 PIB/RJ - 30/05/2026\n";
            mensagem += "--------------------------------\n\n";
            
            const linhas = document.querySelectorAll('.participante-row');
            let totalParticipantes = 0;
            
            linhas.forEach((linha) => {
                const nome = linha.querySelector('.campo-nome').value.trim();
                const idade = linha.querySelector('.campo-idade').value.trim();
                
                if (nome !== "" && idade !== "") {
                    totalParticipantes++;
                    mensagem += "👤 *" + nome + "*\n";
                    mensagem += "🎂 Idade: " + idade + " anos\n";
                    mensagem += "--------------------------------\n";
                }
            });

            if (totalParticipantes > 0) {
                const linkZap = "https://wa.me/" + telefoneOrganizador + "?text=" + encodeURIComponent(mensagem);
                window.open(linkZap, '_blank');
            }
        });
    </script>
</body>
</html>
